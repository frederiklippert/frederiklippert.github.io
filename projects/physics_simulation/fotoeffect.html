<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photoelectric Effect – Simulation</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b14;--panel:#0e1120;--panel2:#141828;--border:#1c2238;--accent:#00d9f5;--acc2:#ff6b35;--acc3:#6effa0;--dim:#4a5a88;--text:#d8e2ff;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;height:100vh;}
header{display:flex;align-items:center;gap:12px;padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
header h1{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:var(--accent);}
.sub{font-size:.58rem;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;}
.light-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;}
#hdr-wl{font-size:.68rem;color:var(--dim);}
.hbtn{background:transparent;border:1px solid var(--border);color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:.65rem;padding:4px 10px;border-radius:3px;cursor:pointer;transition:all .15s;margin-left:auto;}
.hbtn.on{border-color:var(--acc3);color:var(--acc3);}
.hbtn:hover{border-color:var(--accent);color:var(--accent);}
#btn-reset{margin-left:5px;}
#btn-reset:hover{border-color:var(--acc2);color:var(--acc2);}
.body-row{display:flex;flex:1;overflow:hidden;}
.left{width:215px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:11px;gap:13px;}
.left::-webkit-scrollbar{width:3px;}.left::-webkit-scrollbar-thumb{background:var(--border);}
.sect{font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);padding-bottom:5px;border-bottom:1px solid var(--border);}
.freq-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:5px;}
.freq-btn{background:var(--panel2);border:1px solid var(--border);color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:.62rem;padding:5px 3px;border-radius:3px;cursor:pointer;transition:all .12s;text-align:center;line-height:1.4;}
.freq-btn:hover{border-color:var(--accent);color:var(--text);}
.freq-btn.active{background:rgba(0,217,245,.1);border-color:var(--accent);color:var(--accent);}
.freq-btn span{display:block;font-size:.55rem;opacity:.65;}
.sl-wrap{display:flex;flex-direction:column;gap:4px;margin-top:5px;}
.sl-head{display:flex;justify-content:space-between;align-items:baseline;}
.sl-name{font-size:.68rem;color:var(--text);}
.sl-val{font-size:.73rem;font-weight:700;color:var(--accent);}
input[type=range]{width:100%;height:3px;appearance:none;background:var(--border);border-radius:2px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{appearance:none;width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 5px var(--accent);cursor:pointer;}
.col-hdr{display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);padding-bottom:5px;border-bottom:1px solid var(--border);user-select:none;}
.col-hdr .arr{transition:transform .2s;}
.col-hdr.open .arr{transform:rotate(90deg);}
.col-body{overflow:hidden;transition:max-height .25s ease;max-height:0;}
.col-body.open{max-height:260px;}
.mat-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding-top:5px;}
.mat-btn{background:var(--panel2);border:1px solid var(--border);color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:.62rem;padding:5px 3px;border-radius:3px;cursor:pointer;transition:all .12s;text-align:center;line-height:1.4;}
.mat-btn:hover{border-color:var(--acc2);color:var(--text);}
.mat-btn.active{background:rgba(255,107,53,.1);border-color:var(--acc2);color:var(--acc2);}
.mat-btn small{display:block;font-size:.55rem;opacity:.65;}
.mat-cur{background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:5px 8px;font-size:.66rem;display:flex;justify-content:space-between;align-items:center;margin-top:4px;}
.mat-cur .mn{color:var(--text);}.mat-cur .mw{color:var(--acc2);font-weight:700;}
.center{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.sim-area{flex:1;position:relative;overflow:hidden;}
canvas#sim{display:block;width:100%;height:100%;}
.bottom{flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);padding:9px 14px;display:flex;gap:0;align-items:stretch;min-height:100px;}
.vm-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:115px;padding-right:14px;border-right:1px solid var(--border);gap:2px;}
.vm-label{font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
.vm-value{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;color:var(--accent);line-height:1;letter-spacing:-.03em;}
.vm-unit{font-size:.58rem;color:var(--dim);}.vm-sub{font-size:.58rem;color:var(--dim);margin-top:2px;}
.eq-area{flex:1;padding:0 14px;display:flex;flex-direction:column;justify-content:center;gap:5px;}
.eq-title{font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);}
.eq-step{background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:5px 9px;font-size:.7rem;line-height:1.7;}
.eq-result{border-radius:3px;padding:5px 9px;font-size:.73rem;font-weight:700;}
.eq-ok{background:rgba(110,255,160,.07);border:1px solid rgba(110,255,160,.3);color:var(--acc3);}
.eq-err{background:rgba(255,68,102,.07);border:1px solid rgba(255,68,102,.3);color:#ff4466;}
.c{color:var(--accent);}.o{color:var(--acc2);}.g{color:var(--acc3);}.r{color:#ff4466;}
.status-box{display:flex;flex-direction:column;justify-content:center;gap:4px;min-width:148px;padding-left:14px;border-left:1px solid var(--border);}
.s-row{display:flex;align-items:center;gap:6px;}
.s-dot{width:8px;height:8px;border-radius:50%;background:var(--dim);transition:all .3s;flex-shrink:0;}
.s-dot.on{background:var(--acc3);box-shadow:0 0 8px var(--acc3);animation:bl 1.2s infinite;}
.s-dot.blocked{background:#ff4466;box-shadow:0 0 8px #ff4466;}
@keyframes bl{0%,100%{opacity:1;}50%{opacity:.3;}}
.s-txt{font-size:.68rem;color:var(--text);}.s-sub{font-size:.6rem;color:var(--dim);}
</style>
</head>
<body>
<header>
  <h1>Photoelectric Effect</h1><span class="sub">Millikan Counter-Field Method</span>
  <canvas class="light-dot" id="light-dot" width="16" height="16"></canvas>
  <span id="hdr-wl">—</span>
  <button class="hbtn on" id="btn-light">● Light ON</button>
  <button class="hbtn" id="btn-reset">↺ Reset</button>
</header>
<div class="body-row">
  <aside class="left">
    <div>
      <div class="sect">Frequency / Light Color</div>
      <div class="freq-grid" id="freq-btns">
        <button class="freq-btn" data-f="4.00"><span>750 nm · Red</span>4.00×10¹⁴</button>
        <button class="freq-btn" data-f="4.82"><span>622 nm · Orange</span>4.82×10¹⁴</button>
        <button class="freq-btn" data-f="5.26"><span>570 nm · Yellow</span>5.26×10¹⁴</button>
        <button class="freq-btn" data-f="5.77"><span>520 nm · Green</span>5.77×10¹⁴</button>
        <button class="freq-btn" data-f="6.67"><span>450 nm · Blue</span>6.67×10¹⁴</button>
        <button class="freq-btn" data-f="7.50"><span>400 nm · Violet</span>7.50×10¹⁴</button>
        <button class="freq-btn" data-f="8.20"><span>366 nm · UV-A</span>8.20×10¹⁴</button>
        <button class="freq-btn active" data-f="9.50"><span>316 nm · UV-B</span>9.50×10¹⁴</button>
      </div>
      <div class="sl-wrap">
        <div class="sl-head"><span class="sl-name">Fine Adjustment</span><span class="sl-val" id="val-freq">9.50 ×10¹⁴</span></div>
        <input type="range" id="sl-freq" min="3.5" max="12.0" step="0.05" value="9.5">
      </div>
    </div>
    <div>
      <div class="col-hdr open" id="mat-hdr"><span>Cathode Material</span><span class="arr">▶</span></div>
      <div class="col-body open" id="mat-body">
        <div class="mat-grid" id="mat-btns">
          <button class="mat-btn active" data-w="2.36" data-name="Cesium (Cs)">Cs<small>2.36 eV</small></button>
          <button class="mat-btn" data-w="3.78" data-name="Potassium (K)">K<small>3.78 eV</small></button>
          <button class="mat-btn" data-w="4.31" data-name="Sodium (Na)">Na<small>4.31 eV</small></button>
          <button class="mat-btn" data-w="4.50" data-name="Copper (Cu)">Cu<small>4.50 eV</small></button>
          <button class="mat-btn" data-w="5.10" data-name="Silver (Ag)">Ag<small>5.10 eV</small></button>
          <button class="mat-btn" data-w="5.65" data-name="Gold (Au)">Au<small>5.65 eV</small></button>
        </div>
      </div>
      <div class="mat-cur"><span class="mn" id="mat-cur-name">Cesium (Cs)</span><span class="mw">W = <span id="mat-cur-w">2.36</span> eV</span></div>
    </div>
    <div>
      <div class="sect">Accelerating Voltage U_A</div>
      <div class="sl-wrap">
        <div class="sl-head"><span class="sl-name">U_A</span><span class="sl-val" id="val-ub">1.00 V</span></div>
        <input type="range" id="sl-ub" min="0" max="5" step="0.05" value="1.0">
      </div>
    </div>
  </aside>
  <div class="center">
    <div class="sim-area"><canvas id="sim"></canvas></div>
    <div class="bottom">
      <div class="vm-box">
        <div class="vm-label">Voltmeter U_M</div>
        <div class="vm-value" id="vm-val">0.000</div>
        <div class="vm-unit">Volts</div>
        <div class="vm-sub" id="vm-sub">—</div>
      </div>
      <div class="eq-area">
        <div class="eq-title">Derivation &amp; Calculation of E_kin,max</div>
        <div class="eq-step" id="eq-step1">—</div>
        <div class="eq-result eq-ok" id="eq-result">—</div>
      </div>
      <div class="status-box">
        <div class="s-row"><div class="s-dot" id="s-dot"></div><span class="s-txt" id="s-txt">Ready</span></div>
        <div class="s-sub" id="s-sub">—</div>
        <div class="s-sub" id="s-f0">—</div>
      </div>
    </div>
  </div>
</div>
<script>
const hJ=6.626e-34,eC=1.602e-19,cms=3e8;
const state={f:9.5e14,W:2.36,mat:'Cesium (Cs)',UB:1.0,UM:0,run:true,eq:false};
function phys(){const hf=hJ*state.f/eC,ek0=hf-state.W,ekG=ek0+state.UB,Ueq=ekG>0?ekG:0;return{hf,ek0,ekG,Ueq,ok:ek0>0};}
function toRGB(f){const wl=cms/f*1e9;let r=0,g=0,b=0;if(wl<380){r=128;g=0;b=255;}else if(wl<440){r=Math.round((440-wl)/60*255);g=0;b=255;}else if(wl<490){r=0;g=Math.round((wl-440)/50*255);b=255;}else if(wl<510){r=0;g=255;b=Math.round((510-wl)/20*255);}else if(wl<580){r=Math.round((wl-510)/70*255);g=255;b=0;}else if(wl<645){r=255;g=Math.round((645-wl)/65*255);b=0;}else{r=255;g=0;b=0;}return{r,g,b};}
function css(f,a=1){const{r,g,b}=toRGB(f);return`rgba(${r},${g},${b},${a})`;}
const canvas=document.getElementById('sim'),ctx=canvas.getContext('2d'),sa=document.querySelector('.sim-area');
function resize(){canvas.width=sa.clientWidth;canvas.height=sa.clientHeight;}resize();window.addEventListener('resize',resize);
const photons=[],electrons=[],sparks=[];let nxtP=0;
function GL(){const W=canvas.width,H=canvas.height,tH=Math.min(H*.44,180),tY=H*.09,cX=85,gX=cX+W*.28,aX=W-75;return{W,H,tH,tY,cX,gX,aX};}
function spawnP(){const l=GL();photons.push({x:0,y:l.tY+12+Math.random()*(l.tH-24),vx:5.5+Math.random(),dead:false});}
function spawnE(x,y,ek){const sp=3+Math.sqrt(Math.max(ek,0))*2;electrons.push({x,y,vx:sp,vy:(Math.random()-.5)*.8,alpha:1,dead:false,phase:'accel',trail:[]});}
function spawnSk(x,y,col){for(let i=0;i<6;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*3;sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:.06+Math.random()*.04,col});}}
let lastT=0;
function draw(ts){
  requestAnimationFrame(draw);const dt=Math.min((ts-lastT)/16.67,3);lastT=ts;
  const ph=phys(),l=GL();
  ctx.fillStyle='#080b14';ctx.fillRect(0,0,l.W,l.H);
  drawTube(l,ph);drawCircuit(l,ph);
  if(state.run&&ph.ok){nxtP-=dt;if(nxtP<=0){nxtP=5+Math.random()*5;spawnP();}}
  for(let i=photons.length-1;i>=0;i--){const p=photons[i];if(p.dead){photons.splice(i,1);continue;}p.x+=p.vx*dt;if(p.x>=l.cX){p.dead=true;if(ph.ok&&state.run){spawnSk(l.cX,p.y,css(state.f));spawnE(l.cX+10,p.y,ph.ek0);}continue;}ctx.save();ctx.strokeStyle=css(state.f,.85);ctx.lineWidth=1.5;ctx.beginPath();for(let s=0;s<=10;s++){ctx.lineTo(p.x-10+s*2,p.y+Math.sin(s*.65+ts*.025)*2.5);}ctx.stroke();ctx.fillStyle=css(state.f);ctx.beginPath();ctx.moveTo(p.x,p.y-3);ctx.lineTo(p.x+6,p.y);ctx.lineTo(p.x,p.y+3);ctx.fill();ctx.restore();}
  for(let i=electrons.length-1;i>=0;i--){const el=electrons[i];if(el.dead){electrons.splice(i,1);continue;}el.trail.push({x:el.x,y:el.y});if(el.trail.length>15)el.trail.shift();el.x+=el.vx*dt;el.y+=el.vy*dt;if(el.phase==='accel'&&el.x>=l.gX)el.phase='decel';if(el.phase==='decel'){el.vx-=(state.UM/Math.max(l.aX-l.gX,1))*.9*dt;if(el.vx<=0){el.vx=0;el.phase='reflect';}}if(el.x>=l.aX){el.dead=true;spawnSk(l.aX,el.y,'rgba(0,217,245,1)');if(!state.eq){const d=ph.Ueq-state.UM;state.UM=Math.min(state.UM+d*.09+.012,ph.Ueq);if(Math.abs(state.UM-ph.Ueq)<.004){state.UM=ph.Ueq;state.eq=true;}}continue;}if(el.phase==='reflect'){el.vx=-2;el.alpha-=.04*dt;if(el.alpha<=0){el.dead=true;continue;}}if(el.y<l.tY||el.y>l.tY+l.tH){el.vy*=-.7;el.y=Math.max(l.tY+2,Math.min(l.tY+l.tH-2,el.y));}if(el.x<l.cX){el.dead=true;continue;}for(let t=0;t<el.trail.length-1;t++){ctx.strokeStyle=`rgba(0,217,245,${t/el.trail.length*.3*el.alpha})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(el.trail[t].x,el.trail[t].y);ctx.lineTo(el.trail[t+1].x,el.trail[t+1].y);ctx.stroke();}const rgb=el.phase==='reflect'?'255,90,70':'0,217,245';ctx.beginPath();ctx.arc(el.x,el.y,3.5,0,Math.PI*2);ctx.fillStyle=`rgba(${rgb},${el.alpha})`;ctx.shadowColor=`rgba(${rgb},.8)`;ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;}
  for(let i=sparks.length-1;i>=0;i--){const s=sparks[i];s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;if(s.life<=0){sparks.splice(i,1);continue;}ctx.beginPath();ctx.arc(s.x,s.y,2,0,Math.PI*2);ctx.fillStyle=s.col.replace(/[\d.]+\)$/,`${s.life})`).replace('rgb(','rgba(');ctx.fill();}
  updateUI(ph);
}
function drawTube(l,ph){
  const{cX,gX,aX,tY,tH}=l;
  ctx.fillStyle='#111828';ctx.strokeStyle='#1c2238';ctx.lineWidth=1.5;rr(cX-26,tY,aX-cX+54,tH,6);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(74,90,136,.18)';ctx.font='9px JetBrains Mono';ctx.textAlign='center';ctx.fillText('VACUUM',(cX+aX)/2,tY+12);ctx.textAlign='left';
  if(state.run){const{r,g,b}=toRGB(state.f);const bg=ctx.createLinearGradient(0,0,cX-26,0);bg.addColorStop(0,`rgba(${r},${g},${b},.7)`);bg.addColorStop(1,`rgba(${r},${g},${b},0)`);ctx.fillStyle=bg;ctx.fillRect(0,tY+tH/2-4,cX-26,8);ctx.beginPath();ctx.arc(5,tY+tH/2,8,0,Math.PI*2);ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.shadowColor=`rgb(${r},${g},${b})`;ctx.shadowBlur=16;ctx.fill();ctx.shadowBlur=0;}
  if(state.run&&ph.ok){const{r,g,b}=toRGB(state.f);const cg=ctx.createRadialGradient(cX,tY+tH/2,0,cX,tY+tH/2,48);cg.addColorStop(0,`rgba(${r},${g},${b},.16)`);cg.addColorStop(1,`rgba(${r},${g},${b},0)`);ctx.fillStyle=cg;ctx.fillRect(cX-48,tY,96,tH);}
  if(state.UB>0){ctx.globalAlpha=.13;ctx.strokeStyle='#ff6b35';ctx.lineWidth=1;for(let row=1;row<=3;row++){arr(cX+26,tY+tH*row/4,gX-7,tY+tH*row/4,6);}ctx.globalAlpha=1;}
  if(state.UM>.05){const al=Math.min(state.UM/Math.max(ph.Ueq,.01)*.25,.25);ctx.globalAlpha=al;ctx.strokeStyle='#ff4466';ctx.lineWidth=1;for(let row=1;row<=3;row++){arr(aX-26,tY+tH*row/4,gX+7,tY+tH*row/4,6);}ctx.globalAlpha=1;}
  ctx.fillStyle='#283580';ctx.fillRect(cX-13,tY+5,13,tH-10);ctx.strokeStyle='#4858b8';ctx.lineWidth=1;ctx.strokeRect(cX-13,tY+5,13,tH-10);ctx.fillStyle='#7888dd';ctx.font='bold 10px JetBrains Mono';ctx.textAlign='center';ctx.fillText('K',cX-6,tY+tH/2+4);ctx.textAlign='left';
  ctx.strokeStyle='#b0bce0';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(gX,tY+3);ctx.lineTo(gX,tY+tH-3);ctx.stroke();ctx.globalAlpha=.45;ctx.lineWidth=.8;for(let i=0;i<7;i++){const gy=tY+5+i*(tH-10)/6;ctx.strokeStyle='#8898c8';ctx.beginPath();ctx.moveTo(gX-3,gy-3);ctx.lineTo(gX+3,gy+3);ctx.stroke();}ctx.globalAlpha=1;ctx.fillStyle='#b0bce0';ctx.font='9px JetBrains Mono';ctx.textAlign='center';ctx.fillText('G',gX,tY-4);ctx.textAlign='left';
  const chg=Math.min(state.UM/Math.max(ph.Ueq,.01),1);ctx.fillStyle=`rgb(${Math.round(20+chg*65)},${Math.round(85-chg*45)},${Math.round(155-chg*95)})`;ctx.fillRect(aX,tY+5,13,tH-10);ctx.strokeStyle='rgba(0,140,210,.7)';ctx.lineWidth=1;ctx.strokeRect(aX,tY+5,13,tH-10);ctx.fillStyle='#70a8e8';ctx.font='bold 10px JetBrains Mono';ctx.textAlign='center';ctx.fillText('A',aX+6,tY+tH/2+4);ctx.textAlign='left';
  const ly=tY+tH+13;ctx.fillStyle='#4a5a88';ctx.font='9px JetBrains Mono';ctx.textAlign='center';ctx.fillText('Photocathode',cX,ly);ctx.fillText('Grid',gX,ly);ctx.fillText('Anode',aX+6,ly);ctx.textAlign='left';
  if(state.UB>0){ctx.fillStyle='rgba(255,107,53,.33)';ctx.font='8px JetBrains Mono';ctx.textAlign='center';ctx.fillText('→ Accel. Field',(cX+gX)/2,tY+tH/2-12);ctx.textAlign='left';}
  if(state.UM>.05){ctx.fillStyle='rgba(255,68,102,.36)';ctx.font='8px JetBrains Mono';ctx.textAlign='center';ctx.fillText('← Counter Field',(gX+aX)/2,tY+tH/2-12);ctx.textAlign='left';}
  if(!ph.ok&&state.run){ctx.save();ctx.fillStyle='rgba(8,11,20,.82)';rr((cX+aX)/2-125,tY+tH/2-23,250,46,5);ctx.fill();ctx.fillStyle='#ff4466';ctx.font='bold 12px Syne,sans-serif';ctx.textAlign='center';ctx.fillText('h·f < W  —  No Photoelectric Effect!',(cX+aX)/2,tY+tH/2-4);ctx.fillStyle='#4a5a88';ctx.font='9px JetBrains Mono';const f0=((state.W*eC)/(hJ*1e14)).toFixed(2);ctx.fillText(`Threshold frequency f₀ = ${f0} × 10¹⁴ Hz`,(cX+aX)/2,tY+tH/2+14);ctx.restore();ctx.textAlign='left';}
}
function drawCircuit(l,ph){
  const{cX,gX,aX,tY,tH}=l,base=tY+tH+20,midVM=base+26,midUB=base+62;
  const vmCX=(cX+aX)/2+10,vmR=13;
  ctx.strokeStyle='#00d9f5';ctx.lineWidth=1.3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cX-8,tY+tH+3);ctx.lineTo(cX-8,midVM);ctx.lineTo(vmCX-vmR,midVM);ctx.stroke();
  ctx.beginPath();ctx.moveTo(aX+18,tY+tH+3);ctx.lineTo(aX+18,midVM);ctx.lineTo(vmCX+vmR,midVM);ctx.stroke();
  ctx.beginPath();ctx.arc(vmCX,midVM,vmR,0,Math.PI*2);ctx.fillStyle='#0e1120';ctx.fill();ctx.strokeStyle='#00d9f5';ctx.stroke();
  ctx.fillStyle='#00d9f5';ctx.font='bold 8px JetBrains Mono';ctx.textAlign='center';ctx.fillText('V',vmCX,midVM+3);
  ctx.fillStyle='rgba(0,217,245,.5)';ctx.font='8px JetBrains Mono';ctx.fillText(`${state.UM.toFixed(3)} V`,vmCX,midVM+vmR+11);ctx.textAlign='left';
  const ubCX=(cX+gX)/2;
  ctx.strokeStyle='#ff6b35';ctx.lineWidth=1.3;
  ctx.beginPath();ctx.moveTo(cX,tY+tH+3);ctx.lineTo(cX,midUB);ctx.stroke();
  ctx.beginPath();ctx.moveTo(gX,tY+tH+3);ctx.lineTo(gX,midUB);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cX,midUB);ctx.lineTo(ubCX-14,midUB);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ubCX+14,midUB);ctx.lineTo(gX,midUB);ctx.stroke();
  for(let k=0;k<4;k++){const bx=ubCX-10+k*7,lg=k%2===0;ctx.strokeStyle=lg?'#ff6b35':'#556';ctx.lineWidth=lg?2.2:1.1;ctx.beginPath();ctx.moveTo(bx,midUB-(lg?8:5));ctx.lineTo(bx,midUB+(lg?8:5));ctx.stroke();}
  ctx.lineWidth=1.3;ctx.fillStyle='#ff6b35';ctx.font='bold 8px JetBrains Mono';ctx.textAlign='center';ctx.fillText('−',ubCX-19,midUB-3);ctx.fillText('+',ubCX+19,midUB-3);
  ctx.fillStyle='rgba(255,107,53,.55)';ctx.font='8px JetBrains Mono';ctx.fillText(`U_A = ${state.UB.toFixed(2)} V`,ubCX,midUB+20);ctx.textAlign='left';
  gnd(cX,midUB+10,'#2e3c5c');
}
function gnd(x,y,c){ctx.strokeStyle=c;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+5);ctx.stroke();for(let i=0;i<3;i++){const hw=6-i*1.8;ctx.beginPath();ctx.moveTo(x-hw,y+5+i*3.5);ctx.lineTo(x+hw,y+5+i*3.5);ctx.stroke();}}
function arr(x1,y1,x2,y2,hl){const a=Math.atan2(y2-y1,x2-x1);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x2-hl*Math.cos(a-.4),y2-hl*Math.sin(a-.4));ctx.moveTo(x2,y2);ctx.lineTo(x2-hl*Math.cos(a+.4),y2-hl*Math.sin(a+.4));ctx.stroke();}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}
function updateUI(ph){
  document.getElementById('vm-val').textContent=state.UM.toFixed(3);
  document.getElementById('vm-sub').textContent=state.eq?'⇒ Equilibrium':'⇒ charging …';
  document.getElementById('eq-step1').innerHTML=`<span style="color:var(--dim)">e·U<sub>M</sub> = (h·f − W) + e·U<sub>A</sub> = </span><span class="o">(${ph.hf.toFixed(3)} − ${state.W.toFixed(2)})</span><span style="color:var(--dim)"> + </span><span class="c">${state.UB.toFixed(3)}</span><span style="color:var(--dim)"> eV = </span><span class="${ph.ok?'g':'r'}">${ph.ok?ph.Ueq.toFixed(3):'< 0'} eV</span>`;
  const ekin=Math.max(state.UM-state.UB,0),res=document.getElementById('eq-result');
  if(ph.ok){res.className='eq-result eq-ok';res.innerHTML=`<b>E<sub>kin,max</sub></b> = e·(U<sub>M</sub> − U<sub>A</sub>) = e·(${state.UM.toFixed(3)} − ${state.UB.toFixed(3)}) = <span style="color:var(--acc3);font-size:.82rem">${ekin.toFixed(3)} eV</span>`;}else{res.className='eq-result eq-err';res.innerHTML=`h·f = ${ph.hf.toFixed(3)} eV &lt; W = ${state.W.toFixed(2)} eV → No photoelectric effect`;}
  const f0=((state.W*eC)/(hJ*1e14)).toFixed(2);document.getElementById('s-f0').textContent=`f₀ = ${f0} × 10¹⁴ Hz`;
  const dot=document.getElementById('s-dot'),stxt=document.getElementById('s-txt'),ssub=document.getElementById('s-sub');
  if(!state.run){dot.className='s-dot';stxt.textContent='Light off';ssub.textContent='Toggle switch above';}else if(!ph.ok){dot.className='s-dot blocked';stxt.textContent='No effect';ssub.textContent='f < threshold freq.';}else if(state.eq){dot.className='s-dot on';stxt.textContent='Equilibrium';ssub.textContent=`U_M = ${state.UM.toFixed(3)} V`;}else{dot.className='s-dot on';stxt.textContent='e⁻ flowing';ssub.textContent=`U_M ↑ ${state.UM.toFixed(3)} V`;}
}
function updatePreview(){const lc=document.getElementById('light-dot').getContext('2d');const{r,g,b}=toRGB(state.f);lc.clearRect(0,0,16,16);const gd=lc.createRadialGradient(8,8,0,8,8,8);gd.addColorStop(0,`rgb(${r},${g},${b})`);gd.addColorStop(1,`rgba(${r},${g},${b},0)`);lc.fillStyle=gd;lc.beginPath();lc.arc(8,8,8,0,Math.PI*2);lc.fill();document.getElementById('hdr-wl').textContent=`λ = ${Math.round(cms/state.f*1e9)} nm`;}
function reset(){state.UM=0;state.eq=false;photons.length=0;electrons.length=0;sparks.length=0;}
document.getElementById('sl-freq').addEventListener('input',function(){state.f=parseFloat(this.value)*1e14;document.getElementById('val-freq').textContent=(state.f/1e14).toFixed(2)+' ×10¹⁴';document.querySelectorAll('.freq-btn').forEach(b=>b.classList.remove('active'));reset();updatePreview();state.run=true;updT();});
document.getElementById('freq-btns').addEventListener('click',ev=>{const btn=ev.target.closest('.freq-btn');if(!btn)return;document.querySelectorAll('.freq-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.f=parseFloat(btn.dataset.f)*1e14;document.getElementById('sl-freq').value=btn.dataset.f;document.getElementById('val-freq').textContent=btn.dataset.f+' ×10¹⁴';reset();updatePreview();state.run=true;updT();});
document.getElementById('sl-ub').addEventListener('input',function(){state.UB=parseFloat(this.value);document.getElementById('val-ub').textContent=state.UB.toFixed(2)+' V';reset();});
document.getElementById('mat-hdr').addEventListener('click',()=>{document.getElementById('mat-hdr').classList.toggle('open');document.getElementById('mat-body').classList.toggle('open');});
document.getElementById('mat-btns').addEventListener('click',ev=>{const btn=ev.target.closest('.mat-btn');if(!btn)return;document.querySelectorAll('.mat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.W=parseFloat(btn.dataset.w);state.mat=btn.dataset.name;document.getElementById('mat-cur-name').textContent=state.mat;document.getElementById('mat-cur-w').textContent=state.W.toFixed(2);reset();});
function updT(){const b=document.getElementById('btn-light');if(state.run){b.textContent='● Light ON';b.classList.add('on');}else{b.textContent='○ Light OFF';b.classList.remove('on');}}
document.getElementById('btn-light').addEventListener('click',()=>{state.run=!state.run;if(!state.run){electrons.length=0;photons.length=0;sparks.length=0;}updT();});
document.getElementById('btn-reset').addEventListener('click',reset);
updatePreview();requestAnimationFrame(draw);
</script>
</body>
